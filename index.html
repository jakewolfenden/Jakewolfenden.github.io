<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* HEADER */
    .header img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    h2 {
      text-align: center;
      margin: 15px 0;
      font-size: 22px;
    }

    /* SHOP GRID */
    .shop {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      padding: 15px;
    }

    /* PRODUCT CARD */
    .item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    .item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    .item h3 {
      font-size: 18px;
      margin: 10px 0 5px;
    }

    .item p {
      font-size: 18px;
      font-weight: bold;
      margin: 5px 0;
    }

    /* BUTTON */
    button {
      width: 100%;
      background: black;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #333;
    }

    /* CART TOP BAR */
    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 1000;
    }

    /* CART BOX */
    .cart-box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
    }

    .cart-box ul {
      padding-left: 15px;
    }

    /* DESKTOP VIEW */
    @media (min-width: 768px) {
      .shop {
        grid-template-columns: repeat(2, 1fr);
        max-width: 800px;
        margin: auto;
      }

      .header img {
        height: 250px;
      }
    }
  </style>
</head>

<body>

<div class="cart">
  Cart (<span id="cart-count">0</span>)
</div>

<div class="header">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
</div>

<h2>Shop</h2>

<div class="shop">

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2929.jpeg">
    <h3>Football Legends Coin Set</h3>
    <p>£95</p>
    <button onclick="addToCart('Football Legends Coin Set', 95)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2730.jpeg">
    <h3>Vintage Silver Cutlery</h3>
    <p>£300</p>
    <button onclick="addToCart('Vintage Silver Cutlery', 300)">Add to Cart</button>
  </div>

</div>

<div class="cart-box">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p><strong>Total: £<span id="total">0</span></strong></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  let total = 0;

  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " - £" + item.price;
    list.appendChild(li);
    total += item.price;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.length;
}

function checkout() {
  let total = document.getElementById("total").innerText;
  let items = cart.map(item => item.name).join(", ");

  let url = "https://www.paypal.com/cgi-bin/webscr?cmd=_xclick" +
            "&business=j.bw420@icloud.com" +
            "&item_name=" + encodeURIComponent(items) +
            "&amount=" + total +
            "&currency_code=GBP";

  window.location.href = url;
}
</script>

</body>
</html>
