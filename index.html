<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header img {
      width: 100%;
      max-height: 200px; /* thinner banner */
      object-fit: cover;
      display: block;
    }

    h2 {
      text-align: center;
      margin: 20px 0;
    }

    .shop {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 20px;
    }

    .item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 220px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .item img {
      width: 100%;
      height: 150px; /* consistent size */
      object-fit: cover;
      border-radius: 8px;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #333;
    }

    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
      font-size: 14px;
    }

    .cart-box {
      background: white;
      margin: 20px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="cart">
  Cart (<span id="cart-count">0</span>)
</div>

<div class="header">
  <img src="YOUR-BANNER-IMAGE-LINK">
</div>

<h2>Shop</h2>

<div class="shop">

  <!-- CORRECTED: Coins now show coins -->
  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/refs/heads/main/IMG_2730.jpeg">
    <h3>Football Legends Coin Set</h3>
    <p>£25</p>
    <button onclick="addToCart('Football Legends Coin Set', 25)">Add to Cart</button>
  </div>

  <!-- CORRECTED: Cutlery now shows cutlery -->
  <div class="item">
    <img src="YOUR-CUTLERY-IMAGE-LINK">
    <h3>Vintage Silver Cutlery</h3>
    <p>£40</p>
    <button onclick="addToCart('Vintage Silver Cutlery', 40)">Add to Cart</button>
  </div>

</div>

<div class="cart-box">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p>Total: £<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  let total = 0;

  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " - £" + item.price;
    list.appendChild(li);
    total += item.price;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.length;
}

function checkout() {
  let total = document.getElementById("total").innerText;
  let items = cart.map(item => item.name).join(", ");

  let url = "https://www.paypal.com/cgi-bin/webscr?cmd=_xclick" +
            "&business=j420ake" +
            "&item_name=" + encodeURIComponent(items) +
            "&amount=" + total +
            "&currency_code=GBP";

  window.location.href = url;
}
</script>

</
