<!DOCTYPE html>
<html><!DOCTYPE html>
<html>
<head>
<title>The Collectable Habit Co.</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* HEADER */
.header img {
  width: 100%;
  display: block;
}

/* CART BUTTON */
.cart-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: black;
  color: white;
  padding: 10px 15px;
  border-radius: 20px;
  cursor: pointer;
}

/* SHOP */
.shop-title {
  text-align: center;
  margin: 20px;
}

/* PRODUCTS */
.shop {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.product {
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 200px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

button {
  background: black;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

button:hover {
  background: gold;
  color: black;
}

/* CART BOX */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 250px;
  height: 100%;
  background: white;
  padding: 15px;
  display: none;
  box-shadow: -2px 0 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
</div>

<!-- CART BUTTON -->
<div class="cart-btn" onclick="toggleCart()">
  🛒 Cart (<span id="cart-count">0</span>)
</div>

<!-- SHOP -->
<h2 class="shop-title">Shop</h2>

<div class="shop">

  <div class="product">
    <img src="IMG_2730.jpeg">
    <h3>Football Legends Coin Set</h3>
    <p>£25</p>
    <button onclick="addToCart('Football Coin', 25)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="IMG_2929.jpeg">
    <h3>Vintage Silver Cutlery</h3>
    <p>£40</p>
    <button onclick="addToCart('Cutlery', 40)">Add to Cart</button>
  </div>

</div>

<!-- CART PANEL -->
<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p>Total: £<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push(name);
  total += price;

  document.getElementById("cart-count").innerText = cart.length;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - £" + price;
  document.getElementById("cart-items").appendChild(li);
}

function toggleCart() {
  let cartBox = document.getElementById("cart");
  cartBox.style.display = cartBox.style.display === "block" ? "none" : "block";
}

function checkout() {
  alert("Use your PayPal link here!");
}
</script>

</body>
</html>

</html>
