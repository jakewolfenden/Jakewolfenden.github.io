<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ede0c8;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-around;
      background: #3b2f2f;
      padding: 15px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    .nav a.active {
      border-bottom: 2px solid #fff;
    }

    /* HERO */
    .hero img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    /* TAGLINE */
    .tagline {
      text-align: center;
      padding: 15px;
      color: #3b2f2f;
      font-size: 14px;
    }

    /* TRUST */
    .trust {
      text-align: center;
      font-size: 13px;
      color: #6b5b4f;
      padding-bottom: 10px;
    }

    /* GRID */
    .categories {
      display: grid;
      gap: 20px;
      padding: 15px;
    }

    .card {
      background: #fffaf3;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 12px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card h2 {
      margin: 0 0 10px;
      color: #3b2f2f;
    }

    .card a {
      display: inline-block;
      padding: 10px 20px;
      background: black;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #6b5b4f;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="coins.html">Coins</a>
  <a href="cutlery.html">Cutlery</a>
  <a href="furniture.html">Furniture</a>
  <a href="electronics.html">Electronics</a>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
</div>

<!-- TAGLINE -->
<div class="tagline">
  RARE • VINTAGE • COLLECTABLE
</div>

<!-- TRUST -->
<div class="trust">
  Trusted UK seller • Secure checkout • Fast dispatch
</div>

<!-- CATEGORIES -->
<div class="categories">

  <!-- COINS -->
  <div class="card">
    <img src="YOUR_COIN_IMAGE_LINK">
    <div class="card-content">
      <h2>Coins</h2>
      <a href="coins.html">Shop Coins</a>
    </div>
  </div>

  <!-- CUTLERY -->
  <div class="card">
    <img src="YOUR_CUTLERY_IMAGE_LINK">
    <div class="card-content">
      <h2>Cutlery</h2>
      <a href="cutlery.html">Shop Cutlery</a>
    </div>
  </div>

  <!-- FURNITURE -->
  <div class="card">
    <img src="YOUR_FURNITURE_IMAGE_LINK">
    <div class="card-content">
      <h2>Furniture</h2>
      <a href="furniture.html">Shop Furniture</a>
    </div>
  </div>

  <!-- ELECTRONICS -->
  <div class="card">
    <img src="YOUR_ELECTRONICS_IMAGE_LINK">
    <div class="card-content">
      <h2>Electronics</h2>
      <a href="electronics.html">Shop Electronics</a>
    </div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 The Collectable Habit Co.
</div>

</body>
</html>
