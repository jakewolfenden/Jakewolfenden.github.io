<!DOCTYPE html>

<head>

  <!-- STRIPE -->
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #ede0c8;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-around;
      background: #000; /* CHANGED TO BLACK */
      padding: 15px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* HERO */
    .hero img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .tagline {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      color: #3b2f2f;
      letter-spacing: 2px;
    }

    /* SECTIONS */
    .section {
      padding: 20px;
    }

    .section h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #3b2f2f;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .card {
      background: #fffaf3;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    /* PREMIUM BUTTON */
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 22px;
      background: #000;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #333;
    }

    /* TRUST */
    .trust {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #3b2f2f;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 13px;
      color: #6b5b4f;
    }
  </style>
</head>
