  <style>
    body {
      margin:0;
      font-family:'Playfair Display', serif;
      background:#ede0c8;
    }

    /* NAV */
    .nav {
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:15px;
      position: sticky;
      top: 0;
      z-index:1000;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:14px;
      letter-spacing:1px;
    }

    h1 {
      text-align:center;
      margin:30px 0 10px;

    .subtitle {
      text-align:center;
      font-size:14px;
      color:#6b5b4f;
      margin-bottom:30px;
    }

    /* FORM */
    .contact-box {
      background:#fffaf3;
      margin:20px;
      padding:25px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
    }

    input, textarea {
      width:100%;
      padding:12px;
      margin-bottom:15px;
      border-radius:10px;
      border:1px solid #ddd;
      font-family:'Playfair Display', serif;
      font-size:14px;
    }

    textarea {
      height:120px;
      resize:none;
    }

    .btn {
      width:100%;
      padding:14px;
      background:#000;
      color:white;
      border:none;
      border-radius:30px;
      font-size:14px;
      letter-spacing:1px;
      cursor:pointer;
    }

    .contact-details {
      text-align:center;
      margin-top:25px;
      font-size:14px;
      color:#3b2f2f;
      line-height:1.8;
    }

    .contact-details a {
      color:#000;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>
