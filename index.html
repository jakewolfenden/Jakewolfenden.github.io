<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    .header img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    h2 {
      text-align: center;
      margin: 15px 0;
    }

    .shop {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      padding: 15px;
    }

    .item {
      background: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      width: 100%;
      background: black;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 16px;
    }

    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
    }

    .cart-box {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
    }

    @media (min-width: 768px) {
      .shop {
        grid-template-columns: repeat(2, 1fr);
        max-width: 800px;
        margin: auto;
      }
    }
  </style>
</head>

<body>

<div class="cart">
  Cart (<span id="cart-count">0</span>)
</div>

<div class="header">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
</div>

<h2>Shop</h2>

<div class="shop">

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2929.jpeg">
    <h3>Football Legends Coin Set</h3>
    <p>£95</p>
    <button onclick="addToCart('Football Legends Coin Set', 95)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2730.jpeg">
    <h3>Vintage Silver Cutlery</h3>
    <p>£300</p>
    <button onclick="addToCart('Vintage Silver Cutlery', 300)">Add to Cart</button>
  </div>

</div>

<div class="cart-box">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p><strong>Total: £<span id="total">0</span></strong></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  let existing = cart.find(item => item.name === name);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({name, price, qty: 1});
  }
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " x" + item.qty + " - £" + (item.price * item.qty);
    list.appendChild(li);
    total += item.price * item.qty;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.reduce((a, b) => a + b.qty, 0);
}

function checkout() {
  let url = "https://www.paypal.com/cgi-bin/webscr?cmd=_cart&upload=1&business=j.bw420@icloud.com&currency_code=GBP";

  cart.forEach((item, index) => {
    let i = index + 1;
    url += "&item_name_" + i + "=" + encodeURIComponent(item.name);
    url += "&amount_" + i + "=" + item.price;
    url += "&quantity_" + i + "=" + item.qty;
  });

  window.location.href = url;
}
</script>

</body>
</html>
