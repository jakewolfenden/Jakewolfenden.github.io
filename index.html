<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://js.stripe.com/v3/"></script>

  <style>
    body { margin:0; font-family:Arial; background:#ede0c8; }
    .shop { padding:15px; display:grid; gap:15px; }
    .item { background:#fffaf3; padding:15px; border-radius:10px; text-align:center; }
    button { width:100%; padding:12px; background:#3b2f2f; color:#fff; border:none; border-radius:8px; }
    .section { margin:15px; padding:15px; background:#fffaf3; border-radius:10px; }
  </style>
</head>

<body>

<h2>Shop</h2>

<div class="shop">
  <div class="item">
    <h3>Football Legends Coin Set</h3>
    <p>£95</p>
    <button onclick="addToCart('Coin Set', 95)">Add</button>
  </div>

  <div class="item">
    <h3>Vintage Silver Cutlery</h3>
    <p>£300</p>
    <button onclick="addToCart('Cutlery', 300)">Add</button>
  </div>
</div>

<div class="section">
  <h3>Cart</h3>
  <ul id="cart"></ul>
  <p>Total: £<span id="total">0</span></p>
  <button onclick="checkout()">Checkout</button>
</div>

<script type="module">

// 🔥 STRIPE
const stripe = Stripe("pk_test_51TCS6zCQUq7MGjotx7XODIgkbLkwYg4woHfUD8fFTxvJx3Tcf56ozaXwENm9y5ukBzs80sjWf1T9bHQAiuWX3Xhl00RN4Hodm5");

// 🔥 FIREBASE (MODERN FIXED)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEnNj3GB2JtDwUqKqsGl1GwGl6N3SQw54",
  authDomain: "collectable-habit.firebaseapp.com",
  projectId: "collectable-habit",
  storageBucket: "collectable-habit.firebasestorage.app",
  messagingSenderId: "149591924509",
  appId: "1:149591924509:web:d155fa669fd501e6f10bf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🛒 CART
let cart = [];

window.addToCart = function(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " £" + item.price;
    list.appendChild(li);
    total += item.price;
  });

  document.getElementById("total").innerText = total;
}

// 🚀 CHECKOUT
window.checkout = async function() {

  if(cart.length === 0){
    alert("Cart empty");
    return;
  }

  let total = cart.reduce((a,b)=>a+b.price,0);

  // SAVE ORDER 🔥
  await addDoc(collection(db, "orders"), {
    items: cart,
    total: total,
    created: new Date()
  });

  // 🔥 REDIRECT TO STRIPE (TEMP)
  window.location.href = "https://buy.stripe.com/test_6oU14m4cK8Drei3e6U97G02";
}

</script>

</body>
</html>
