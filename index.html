<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ede0c8;
    }

    .header img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    h2 {
      text-align: center;
      color: #3b2f2f;
    }

    .shop {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      padding: 15px;
    }

    .item {
      background: #fffaf3;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .item img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      width: 100%;
      background: #3b2f2f;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 16px;
    }

    .cart {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #3b2f2f;
      color: white;
      padding: 10px 15px;
      border-radius: 20px;
    }

    .section {
      background: #fffaf3;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="cart">
  Cart (<span id="cart-count">0</span>)
</div>

<div class="header">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
</div>

<h2>Shop</h2>

<div id="shop-page">

<div class="shop">

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2929.jpeg">
    <h3>Football Legends Coin Set</h3>
    <p>£95</p>
    <button onclick="addToCart('Football Legends Coin Set', 95)">Add to Cart</button>
  </div>

  <div class="item">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2730.jpeg">
    <h3>Vintage Silver Cutlery</h3>
    <p>£300</p>
    <button onclick="addToCart('Vintage Silver Cutlery', 300)">Add to Cart</button>
  </div>

</div>

<div class="section">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p><strong>Total: £<span id="total">0</span></strong></p>
  <button onclick="goToCheckout()">Checkout</button>
</div>

</div>

<!-- CHECKOUT PAGE -->
<div id="checkout-page" class="hidden section">
  <h2>Checkout</h2>

  <input id="name" placeholder="Full Name">
  <input id="email" placeholder="Email">
  <input id="address" placeholder="Shipping Address">

  <p><strong>Total: £<span id="checkout-total">0</span></strong></p>

  <button onclick="payNow()">Pay with PayPal</button>
  <button onclick="goBack()">Back to Shop</button>
</div>

<script>
let cart = [];

function addToCart(name, price) {
  let existing = cart.find(item => item.name === name);
  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({name, price, qty: 1});
  }
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  let total = 0;
  list.innerHTML = "";

  cart.forEach(item => {
    let li = document.createElement("li");
    li.innerText = item.name + " x" + item.qty + " - £" + (item.price * item.qty);
    list.appendChild(li);
    total += item.price * item.qty;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cart-count").innerText = cart.reduce((a, b) => a + b.qty, 0);
}

function goToCheckout() {
  document.getElementById("shop-page").classList.add("hidden");
  document.getElementById("checkout-page").classList.remove("hidden");
  document.getElementById("checkout-total").innerText = document.getElementById("total").innerText;
}

function goBack() {
  document.getElementById("checkout-page").classList.add("hidden");
  document.getElementById("shop-page").classList.remove("hidden");
}

function payNow() {
  let total = document.getElementById("checkout-total").innerText;
  let items = cart.map(item => item.name + " x" + item.qty).join(", ");

  let url = "https://www.paypal.com/cgi-bin/webscr?cmd=_xclick" +
            "&business=j.bw420@icloud.com" +
            "&item_name=" + encodeURIComponent(items) +
            "&amount=" + total +
            "&currency_code=GBP";

  window.location.href = url;
}
</script>

</body>
</html>
