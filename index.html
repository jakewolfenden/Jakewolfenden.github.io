<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ede0c8;
      color: #3b2f2f;
    }

    /* NAVBAR */
    .nav {
      display: flex;
      justify-content: space-around;
      background: #3b2f2f;
      padding: 15px;
      position: sticky;
      top: 0;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 14px;
    }

    /* HERO */
    .hero {
      position: relative;
      text-align: center;
      color: white;
    }

    .hero img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      filter: brightness(70%);
    }

    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .hero-text h1 {
      margin: 0;
      font-size: 28px;
    }

    .hero-text p {
      margin: 5px 0;
      font-size: 14px;
    }

    /* CATEGORY GRID */
    .categories {
      display: grid;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #fffaf3;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h2 {
      margin: 10px 0;
    }

    .card a {
      display: inline-block;
      margin-bottom: 15px;
      padding: 10px 15px;
      background: black;
      color: white;
      border-radius: 6px;
      text-decoration: none;
    }

    /* INFO */
    .info {
      text-align: center;
      padding: 20px;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="coins.html">Coins</a>
  <a href="cutlery.html">Cutlery</a>
  <a href="furniture.html">Furniture</a>
  <a href="electronics.html">Electronics</a>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/25B116EB-0D08-4475-A8F3-DF62EE84436B.png">
  <div class="hero-text">
    <h1>The Collectable Habit Co.</h1>
    <p>Rare. Vintage. Collectable.</p>
  </div>
</div>

<!-- CATEGORIES -->
<div class="categories">

  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2929.jpeg">
    <h2>Coins</h2>
    <a href="coins.html">Shop Coins</a>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2730.jpeg">
    <h2>Cutlery</h2>
    <a href="cutlery.html">Shop Cutlery</a>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2730.jpeg">
    <h2>Furniture</h2>
    <a href="furniture.html">Explore</a>
  </div>

  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_2929.jpeg">
    <h2>Electronics</h2>
    <a href="electronics.html">Explore</a>
  </div>

</div>

<!-- INFO -->
<div class="info">
  <p>📦 1–3 Day Dispatch</p>
  <p>🚚 £5.99 UK Delivery</p>
  <p>✔ Secure Checkout with Stripe</p>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 The Collectable Habit Co.
</div>

</body>
</html>
