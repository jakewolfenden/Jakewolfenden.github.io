<!DOCTYPE html>
<html>
<head>
  <title>Electronics | The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- STRIPE -->
  <script async src="https://js.stripe.com/v3/buy-button.js"></script>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Playfair Display', serif;
      background:#ede0c8;
    }

    /* NAV */
    .nav {
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:15px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:14px;
      letter-spacing:1px;
    }

    h1 {
      text-align:center;
      color:#3b2f2f;
      margin:20px 0;
    }

    /* PRODUCTS */
    .products {
      display:grid;
      gap:20px;
      padding:15px;
    }

    .card {
      background:#fffaf3;
      border-radius:15px;
      padding:15px;
      text-align:center;
      box-shadow:0 6px 15px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:10px;
      cursor:pointer;
    }

    .price {
      font-size:20px;
      margin:10px 0;
      font-weight:bold;
    }

    .info {
      font-size:13px;
      color:#6b5b4f;
      margin-top:10px;
      line-height:1.6;
    }

    /* POPUP */
    .popup {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .popup img {
      max-width:90%;
      max-height:90%;
      border-radius:10px;
    }

    .popup.active {
      display:flex;
    }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="index.html">Home</a>
  <a href="coins.html">Coins</a>
  <a href="cutlery.html">Cutlery</a>
  <a href="furniture.html">Furniture</a>
  <a href="electronics.html">Electronics</a>
  <a href="contact.html">Contact</a>
</div>

<h1>Electronics</h1>

<div class="products">

  <!-- PRODUCT -->
  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_3062.jpeg" onclick="openPopup(this.src)">
    
    <h3>Vintage Electronic Item</h3>
    
    <p class="price">£75</p>

    <!-- ADD YOUR STRIPE BUTTON HERE -->
    <!-- Example:
    <stripe-buy-button
      buy-button-id="YOUR_ID"
      publishable-key="YOUR_KEY">
    </stripe-buy-button>
    -->

    <div class="info">
      🚚 £5.99 delivery <br>
      📍 Free Collection Available <br>
      🔒 Secure checkout
    </div>
  </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script>
function openPopup(src) {
  document.getElementById("popupImg").src = src;
  document.getElementById("popup").classList.add("active");
}

function closePopup() {
  document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
