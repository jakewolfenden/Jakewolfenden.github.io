<!DOCTYPE html>
<html>
<head>
  <title>The Collectable Habit Co.</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      text-align: center;
    }

    h1 {
      background: black;
      color: white;
      padding: 15px;
      margin: 0;
    }

    .shop {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .product img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 8px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
    }

    button {
      background: black;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  <style>
.header {
  background: black;
  color: white;
  padding: 10px;
}

.header img {
  width: 60px;
  display: block;
  margin: 0 auto 5px;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}
</style>
</head>

<body>

  <div class="header">
  <img src="25B116EB-0D08-4475-A8F3-DF62EE84436B.png" alt="Logo">
  <h1>The Collectable Habit Co.</h1>
</div>

  <div class="shop">

    <div class="product">
      <img src="IMG_2730.jpeg">
      <h3>Football Legends Coin Set</h3>
      <p class="price">£25</p>
      <a href="https://www.paypal.com/paypalme/j420ake/25" target="_blank">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="product">
      <img src="IMG_2929.jpeg">
      <h3>Vintage Silver Cutlery</h3>
      <p class="price">£40</p>
      <a href="https://www.paypal.com/paypalme/j420ake/40" target="_blank">
        <button>Buy Now</button>
      </a>
    </div>

  </div>

</body>
</html>
