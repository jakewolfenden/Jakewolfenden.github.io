<!DOCTYPE html>
<html>
<head>
  <title>Electronics | The Collectable Habit Co.</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script async src="https://js.stripe.com/v3/buy-button.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Playfair Display', serif;
      background:#ede0c8;
    }

    .nav {
      display:flex;
      justify-content:space-around;
      background:#000;
      padding:18px;
      position: sticky;
      top:0;
      z-index:1000;
    }

    .nav a {
      color:white;
      text-decoration:none;
      font-size:14px;
      letter-spacing:1.5px;
      opacity:0.85;
    }

    .nav a:hover {
      opacity:1;
    }

    h1 {
      text-align:center;
      color:#3b2f2f;
      margin:30px 0 15px;
    }

    /* HEADER IMAGE */
    .header-img {
      padding: 0 20px 20px;
    }

    .header-img img {
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:20px;
    }

    .products {
      display:grid;
      gap:25px;
      padding:20px;
    }

    .card {
      background:#fffaf3;
      border-radius:20px;
      padding:18px;
      text-align:center;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
      transition:0.25s ease;
    }

    .card:hover {
      transform:translateY(-4px);
      box-shadow:0 18px 40px rgba(0,0,0,0.12);
    }

    .card img {
      width:100%;
      height:220px;
      object-fit:cover;
      border-radius:12px;
      cursor:pointer;
    }

    .price {
      font-size:22px;
      margin:12px 0;
      font-weight:bold;
    }

    .popup {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.92);
      justify-content:center;
      align-items:center;
    }

    .popup img {
      max-width:90%;
      max-height:90%;
      border-radius:12px;
    }

    .popup.active {
      display:flex;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="coins.html">Coins</a>
  <a href="cutlery.html">Cutlery</a>
  <a href="furniture.html">Furniture</a>
  <a href="electronics.html">Electronics</a>
  <a href="contact.html">Contact</a>
</div>

<h1>Electronics</h1>

<!-- HEADER IMAGE -->
<div class="header-img">
  <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/refs/heads/main/IMG_3062.jpeg">
</div>

<div class="products">

  <div class="card">
    <img src="https://raw.githubusercontent.com/jakewolfenden/Jakewolfenden.github.io/main/IMG_3062.jpeg" onclick="openPopup(this.src)">

    <h3>Vintage Electronic Item</h3>

    <p class="price">£75</p>

    <p style="font-size:13px; color:#8b7d6b;">Only 1 available</p>
    <p style="font-size:13px;">🔒 Secure checkout with Stripe</p>
    <p style="font-size:13px;">🚚 £5.99 delivery or FREE collection</p>

    <!-- ADD YOUR STRIPE BUTTON HERE -->

  </div>

</div>

<div class="popup" id="popup" onclick="closePopup()">
  <img id="popupImg">
</div>

<script>
function openPopup(src) {
  document.getElementById("popupImg").src = src;
  document.getElementById("popup").classList.add("active");
}
function closePopup() {
  document.getElementById("popup").classList.remove("active");
}
</script>

</body>
</html>
